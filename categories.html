<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories Page</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/categories.css" />
</head>

<body>
  <div id="top-navbar"></div>
  <div id="second-navbar"></div>

  <main>
    <div class="container">
      <div class="main-content w-100">
        <!-- Page Title -->
        <div class="page-title d-flex justify-content-between align-items-center">
          <div>
            <h1 class="fw-bold">Categories</h1>
            <p class="m-0" style="color: var(--primary)">
              Manage product categories
            </p>
          </div>
          <button class="add-category-btn" id="addCategoryBtn">
            <i class="fa-solid fa-plus"></i> Add Category
          </button>
        </div>

        <!-- Search Bar -->
        <div class="search-card card mb-4">
          <div class="search-wrapper d-flex align-items-center gap-2">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="categorySearch" class="search-input" placeholder="Search categories..." />
          </div>
        </div>

        <!-- Categories Table Card -->
        <div class="categories-card card">
          <div class="table-responsive">
            <table class="table categories-table">
              <thead>
                <tr>
                  <th>Category Name</th>
                  <th>Description</th>
                  <th>Products</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="categoriesTableBody"></tbody>
            </table>
          </div>

          <!-- Table Footer / Pagination -->
          <div class="table-footer">
            <span id="categoriesCount">Loading...</span>
            <div class="pagination"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Add/Edit Category Modal -->
  <div class="modal-overlay" id="categoryModal">
    <div class="modal-box">
      <div class="modal-header d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0">Add New Category</h4>
        <button class="modal-close" id="modalClose">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group mb-3">
          <label class="form-label">Category Name</label>
          <input type="text" class="form-control cat-input" placeholder="e.g. Electronics" />
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control cat-input" rows="3"
            placeholder="Short description of this category..."></textarea>
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Products</label>
          <input type="number" class="form-control cat-input" placeholder="Number of products" />
        </div>
        <div class="form-group mb-4">
          <label class="form-label">Status</label>
          <select class="form-control cat-input">
            <option value="" disabled selected>Select Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <div class="d-flex gap-3 justify-content-end">
          <button class="cancel-btn" id="cancelBtn">Cancel</button>
          <button class="add-category-btn">Save Category</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box" style="max-width: 400px">
      <div class="modal-header d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold m-0" id="confirmTitle">Confirm</h4>
        <button class="modal-close" id="confirmClose">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <p id="confirmMessage" class="mb-4"></p>
        <div class="d-flex gap-3 justify-content-end">
          <button class="cancel-btn" id="confirmCancel">Cancel</button>
          <button class="add-category-btn" id="confirmOk">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <footer id="footer"></footer>
  <!-- Scripts -->
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/categories.js"></script>
</body>

</html>
